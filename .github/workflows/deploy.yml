name: Build and Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

# A newer push to main cancels an in-flight run so the latest commit wins fast.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Required for OIDC federated-credential login to Azure (no stored secret).
permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: client-abeam-rg-poc
  AZURE_STATIC_WEB_APP_NAME: client-abeam-swa-poc1-poc

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # GitHub Environment "abeam-poc" (no approval gate — adds no latency).
    # The OIDC federated credential subject is scoped to this environment.
    environment: abeam-poc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      # Skips re-downloading the StaticSitesClient deploy binary on repeat runs.
      - name: Cache SWA deploy binary
        uses: actions/cache@v4
        with:
          path: ~/.swa/deploy
          key: swa-deploy-bin-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: swa-deploy-bin-${{ runner.os }}-

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Static Web Apps deployment token
        id: swa
        run: |
          token=$(az staticwebapp secrets list \
            --name "$AZURE_STATIC_WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.apiKey" -o tsv)
          if [ -z "$token" ]; then
            echo "Failed to resolve deployment token for $AZURE_STATIC_WEB_APP_NAME in $AZURE_RESOURCE_GROUP" >&2
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      # Deploy with the SWA CLI directly on the runner (no Docker container build).
      - name: Deploy to Azure Static Web Apps
        run: npx swa deploy ./dist --env production --deployment-token "${{ steps.swa.outputs.token }}"
