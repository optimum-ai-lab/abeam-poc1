name: Build and Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for OIDC federated-credential login to Azure (no stored secret).
permissions:
  id-token: write
  contents: read

# --- Fill in the Static Web App resource name that lives in client-abeam-rg-poc ---
env:
  AZURE_RESOURCE_GROUP: client-abeam-rg-poc
  AZURE_STATIC_WEB_APP_NAME: client-abeam-swa-poc1-poc

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Maps to a GitHub Environment named "abeam-poc". The federated credential
    # subject must match this (see DEPLOYMENT.md). Remove this line if you scope
    # the federated credential to the main branch instead of an environment.
    environment: abeam-poc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Static Web Apps deployment token
        id: swa
        run: |
          token=$(az staticwebapp secrets list \
            --name "$AZURE_STATIC_WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.apiKey" -o tsv)
          if [ -z "$token" ]; then
            echo "Failed to resolve deployment token for $AZURE_STATIC_WEB_APP_NAME in $AZURE_RESOURCE_GROUP" >&2
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          action: upload
          # We build above, so tell the action not to run its own Oryx build.
          skip_app_build: true
          skip_api_build: true
          app_location: dist
